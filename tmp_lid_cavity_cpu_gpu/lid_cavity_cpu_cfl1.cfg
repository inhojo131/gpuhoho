%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%                                                                              %
% SU2 configuration file                                                       %
% Case description: 2D lid-driven cavity for CPU timing                        %
% Base physics: moving-wall cavity                                             %
%                                                                              %
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

% ------------- DIRECT, ADJOINT, AND LINEARIZED PROBLEM DEFINITION ------------%
SOLVER= NAVIER_STOKES
KIND_TURB_MODEL= NONE
MATH_PROBLEM= DIRECT
RESTART_SOL= NO
ENABLE_CUDA= NO

% -------------------- COMPRESSIBLE FREE-STREAM DEFINITION --------------------%
MACH_NUMBER= 0.05
AOA= 0.0
SIDESLIP_ANGLE= 0.0
FREESTREAM_TEMPERATURE= 288.15
REYNOLDS_NUMBER= 1000.0
REYNOLDS_LENGTH= 1.0

% ----------------------- DYNAMIC MESH DEFINITION -----------------------------%
SURFACE_MOVEMENT= MOVING_WALL
MACH_MOTION= 0.1
MARKER_MOVING= ( y_plus )
SURFACE_TRANSLATION_RATE= 33.179 0.0 0.0

% ---------------------- REFERENCE VALUE DEFINITION ---------------------------%
REF_ORIGIN_MOMENT_X = 0.25
REF_ORIGIN_MOMENT_Y = 0.00
REF_ORIGIN_MOMENT_Z = 0.00
REF_LENGTH= 1.0
REF_AREA= 1.0

% -------------------- BOUNDARY CONDITION DEFINITION --------------------------%
MARKER_HEATFLUX= ( y_plus, 0.0, x_minus, 0.0, x_plus, 0.0, y_minus, 0.0 )
MARKER_PLOTTING= ( y_plus, x_minus, x_plus, y_minus )
MARKER_MONITORING= ( y_plus, x_minus, x_plus, y_minus )

% ------------- COMMON PARAMETERS DEFINING THE NUMERICAL METHOD ---------------%
NUM_METHOD_GRAD= WEIGHTED_LEAST_SQUARES
CFL_NUMBER= 1.0
CFL_ADAPT= NO
ITER= 50

% ------------------------ LINEAR SOLVER DEFINITION ---------------------------%
LINEAR_SOLVER= BCGSTAB
LINEAR_SOLVER_PREC= JACOBI
LINEAR_SOLVER_ERROR= 1E-6
LINEAR_SOLVER_ITER= 50

% -------------------------- MULTIGRID PARAMETERS -----------------------------%
MGLEVEL= 0
MGCYCLE= V_CYCLE
MG_PRE_SMOOTH= ( 1, 1, 1, 1 )
MG_POST_SMOOTH= ( 0, 0, 0, 0 )
MG_CORRECTION_SMOOTH= ( 0, 0, 0, 0 )
MG_DAMP_RESTRICTION= 0.9
MG_DAMP_PROLONGATION= 0.9

% -------------------- FLOW NUMERICAL METHOD DEFINITION -----------------------%
CONV_NUM_METHOD_FLOW= ROE
MUSCL_FLOW= YES
SLOPE_LIMITER_FLOW= NONE
JST_SENSOR_COEFF= ( 0.5, 0.02 )
TIME_DISCRE_FLOW= EULER_IMPLICIT

% --------------------------- CONVERGENCE PARAMETERS --------------------------%
CONV_RESIDUAL_MINVAL= -12
CONV_STARTITER= 10
CONV_CAUCHY_ELEMS= 100
CONV_CAUCHY_EPS= 1E-12

% ------------------------- INPUT/OUTPUT INFORMATION --------------------------%
MESH_FORMAT= RECTANGLE
MESH_BOX_SIZE= (129, 129, 0)
MESH_BOX_LENGTH= (1.0, 1.0, 0.0)
MESH_BOX_OFFSET= (0.0, 0.0, 0.0)
MESH_OUT_FILENAME= mesh_out_cpu_cfl1
SOLUTION_FILENAME= solution_flow_cpu_cfl1
SOLUTION_ADJ_FILENAME= solution_adj
TABULAR_FORMAT= CSV
CONV_FILENAME= history_cpu_cfl1
RESTART_FILENAME= restart_flow_cpu_cfl1
RESTART_ADJ_FILENAME= restart_adj
VOLUME_FILENAME= flow_cpu_cfl1
VOLUME_ADJ_FILENAME= adjoint
GRAD_OBJFUNC_FILENAME= of_grad
SURFACE_FILENAME= surface_flow_cpu_cfl1
SURFACE_ADJ_FILENAME= surface_adjoint
OUTPUT_WRT_FREQ= 2000
SCREEN_OUTPUT= (INNER_ITER, WALL_TIME, RMS_DENSITY, RMS_ENERGY, LIFT, DRAG)
OUTPUT_FILES= (RESTART, PARAVIEW)
